services:
  - type: web
    name: intervista-backend
    env: node
    region: oregon
    plan: free
    # Removed rootDir: backend to use the root package.json delegation.
    # This is more robust as it works with Render's default behaviors.
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
